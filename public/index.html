<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduBot Premium - Konsultan Pendidikan</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎓 EduBot Premium</h1>
      <p>Konsultan Pendidikan & Rekomendasi Sekolah</p>
    </div>
    <div id="chat-box" class="chat-box">
      <div class="message bot">Halo! Saya EduBot. Ada yang bisa saya bantu terkait informasi sekolah atau universitas hari ini?</div>
    </div>
    <div class="input-area">
      <form id="chat-form">
        <input type="text" id="user-input" placeholder="Tanya tentang SD, SMP, SMK, atau Kuliah..." autocomplete="off" required />
        <button type="submit">Tanya</button>
      </form>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
