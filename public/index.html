<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduBot Premium - Konsultan Pendidikan</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎓 EduBot Premium</h1>
      <p>Konsultan Pendidikan & Rekomendasi Sekolah</p>
    </div>
    <div id="chat-box" class="chat-box">
      <div class="message bot">Halo! Saya EduBot. Ada yang bisa saya bantu terkait informasi sekolah atau universitas hari ini?</div>
    </div>
    <div class="input-area">
      <form id="chat-form">
        <input type="file" id="file-input" accept="image/*, .pdf, .txt, audio/*" style="display: none;" />
        
        <button type="button" id="file-btn" style="padding: 0 15px; border-radius: 50%;" title="Upload Gambar, PDF, atau Audio">📎</button>
        
        <input type="text" id="user-input" placeholder="Tanya atau lampirkan file (Brosur/PDF/Audio)..." autocomplete="off" />
        <button type="submit">Tanya</button>
      </form>
      <small id="file-name" style="display: block; margin-top: 5px; color: var(--secondary);"></small>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
